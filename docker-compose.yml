version: '3.8'

services:
  spring-boot:
    build: .
    ports:
      - "8081:8081"
    environment:
      - AI_BRAIN_BASE_URL=https://MRBADDY-student-life-os-ai-docker.hf.space
      - AI_BRAIN_TIMEOUT_MS=5000
      - AI_BRAIN_CONNECT_TIMEOUT_MS=2000
      - AI_BRAIN_READ_TIMEOUT_MS=5000
      - AI_BRAIN_MAX_RETRIES=3
    restart: unless-stopped


  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  ollama_data:
